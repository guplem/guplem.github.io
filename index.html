<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="resources/images/webicon.webp" />
    <title id="page-title">Portfolio</title>
    <meta id="page-description" name="description" content="" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="css/global/variables.css" />
    <link rel="stylesheet" href="css/global/base.css" />
    <link rel="stylesheet" href="css/global/layout.css" />
    <link rel="stylesheet" href="css/sections/hero.css" />
    <link rel="stylesheet" href="css/sections/about.css" />
    <link rel="stylesheet" href="css/sections/works.css" />
    <link rel="stylesheet" href="css/sections/additional.css" />
    <link rel="stylesheet" href="css/sections/contact.css" />
  </head>

  <body>
    <nav id="siteNav">
      <div class="nav-inner">
        <a class="nav-logo" href="#introduction">GP</a>
        <div class="nav-links">
          <a href="#aboutMe">About</a>
          <a href="#myWork">Work</a>
          <a href="#contact">Contact</a>
        </div>
      </div>
    </nav>

    <header id="introduction">
      <canvas id="simCanvas"></canvas>
      <div class="hero-content" id="heroContent"></div>
      <a id="scrollCue" href="#aboutMe">
        <span class="scroll-label">Scroll</span>
        <span class="scroll-line"></span>
      </a>
    </header>

    <section id="aboutMe" class="section">
      <div class="container">
        <div class="section-label" id="aboutMeTitle"></div>
        <div class="about-grid">
          <div class="about-photo">
            <img id="aboutMeImage" alt="" />
          </div>
          <div class="about-text" id="aboutMeContents"></div>
        </div>
      </div>
    </section>

    <section id="myWork" class="section section--alt">
      <div class="container container--wide">
        <div class="section-label" id="myWorkTitle"></div>
        <div id="myWorkFilters" class="filters">
          <div id="myWorkTypes" class="filter-row"></div>
          <div id="myWorkSkills" class="filter-row filter-row--secondary"></div>
        </div>
        <div id="myWorkFiltered" class="work-grid"></div>
      </div>
    </section>

    <div id="additionalSections"></div>

    <footer id="contact" class="section">
      <div class="container">
        <div class="section-label" id="contactTitle"></div>
        <div id="contactMethods" class="contact-row"></div>
      </div>
    </footer>

    <script type="module" src="js/planetSimulation/simulation.js" defer></script>
    <script type="module" src="js/layoutBuilder/dataFiller.js" defer></script>
    <script type="module" src="js/layoutBuilder/structure.js" defer></script>
    <script type="module" src="js/effects/init.js" defer></script>
  </body>
</html>

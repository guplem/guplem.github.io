<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Snap Editor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Camera Screen -->
  <div id="camera-screen" class="screen active">
    <video id="camera-feed" autoplay playsinline muted></video>
    <div id="camera-controls">
      <button id="btn-gallery" class="cam-btn" aria-label="Open gallery">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
      </button>
      <button id="btn-capture" class="capture-btn" aria-label="Take photo"></button>
      <button id="btn-flip" class="cam-btn" aria-label="Flip camera">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"/><path d="M4 20L21 3"/><path d="M21 16v5h-5"/><path d="M15 15l6 6"/><path d="M4 4l5 5"/></svg>
      </button>
    </div>
    <input type="file" id="gallery-input" accept="image/*" hidden>
  </div>

  <!-- Editor Screen -->
  <div id="editor-screen" class="screen">
    <div id="editor-toolbar">
      <button id="btn-back" class="tool-btn" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 19l-7-7 7-7"/></svg>
      </button>
      <div id="tool-buttons">
        <button class="tool-btn" data-tool="crop" aria-label="Crop">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6.13 1L6 16a2 2 0 002 2h15"/><path d="M1 6.13L16 6a2 2 0 012 2v15"/></svg>
        </button>
        <button class="tool-btn" data-tool="draw" aria-label="Draw">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21.174 6.812a1 1 0 00-3.986-3.987L3.842 16.174a2 2 0 00-.5.83l-1.321 4.352a.5.5 0 00.623.622l4.353-1.32a2 2 0 00.83-.497z"/></svg>
        </button>
        <button class="tool-btn" data-tool="text" aria-label="Text">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
        </button>
        <button class="tool-btn" data-tool="emoji" aria-label="Emoji">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9" stroke-width="2.5"/><line x1="15" y1="9" x2="15.01" y2="9" stroke-width="2.5"/></svg>
        </button>
        <button class="tool-btn" data-tool="filter" aria-label="Filters">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 000 20 14.5 14.5 0 000-20"/><path d="M2 12h20"/></svg>
        </button>
      </div>
      <button id="btn-save" class="tool-btn save-btn" aria-label="Save">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Save
      </button>
    </div>

    <div id="editor-canvas-container">
      <canvas id="editor-canvas"></canvas>
      <!-- Overlay for stickers/text elements -->
      <div id="sticker-layer"></div>
      <!-- Crop overlay -->
      <div id="crop-overlay" class="hidden">
        <div id="crop-box">
          <div class="crop-handle tl"></div>
          <div class="crop-handle tr"></div>
          <div class="crop-handle bl"></div>
          <div class="crop-handle br"></div>
        </div>
      </div>
    </div>

    <!-- Sub-toolbars -->
    <div id="draw-options" class="sub-toolbar hidden">
      <div id="brush-sizes">
        <button class="size-btn active" data-size="3"><span style="width:6px;height:6px"></span></button>
        <button class="size-btn" data-size="8"><span style="width:12px;height:12px"></span></button>
        <button class="size-btn" data-size="15"><span style="width:20px;height:20px"></span></button>
        <button class="size-btn" data-size="25"><span style="width:28px;height:28px"></span></button>
      </div>
      <div id="color-palette">
        <button class="color-btn active" data-color="#FFFFFF" style="background:#FFFFFF"></button>
        <button class="color-btn" data-color="#000000" style="background:#000000"></button>
        <button class="color-btn" data-color="#FF453A" style="background:#FF453A"></button>
        <button class="color-btn" data-color="#FF9F0A" style="background:#FF9F0A"></button>
        <button class="color-btn" data-color="#FFD60A" style="background:#FFD60A"></button>
        <button class="color-btn" data-color="#30D158" style="background:#30D158"></button>
        <button class="color-btn" data-color="#0A84FF" style="background:#0A84FF"></button>
        <button class="color-btn" data-color="#BF5AF2" style="background:#BF5AF2"></button>
        <button class="color-btn" data-color="#FF375F" style="background:#FF375F"></button>
      </div>
      <button id="btn-undo-draw" class="tool-btn" aria-label="Undo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 105.64-11.36L1 10"/></svg>
      </button>
    </div>

    <div id="emoji-picker" class="sub-toolbar hidden">
      <div id="emoji-grid"></div>
    </div>

    <div id="filter-options" class="sub-toolbar hidden">
      <div id="filter-list"></div>
    </div>

    <div id="crop-actions" class="sub-toolbar hidden">
      <button id="btn-crop-cancel" class="action-btn">Cancel</button>
      <div id="crop-ratios">
        <button class="ratio-btn active" data-ratio="free">Free</button>
        <button class="ratio-btn" data-ratio="1:1">1:1</button>
        <button class="ratio-btn" data-ratio="4:3">4:3</button>
        <button class="ratio-btn" data-ratio="16:9">16:9</button>
      </div>
      <button id="btn-crop-apply" class="action-btn primary">Apply</button>
    </div>

    <div id="text-options" class="sub-toolbar hidden">
      <input type="text" id="text-input" placeholder="Type something..." maxlength="100">
      <div id="text-colors">
        <button class="color-btn active" data-color="#FFFFFF" style="background:#FFFFFF"></button>
        <button class="color-btn" data-color="#000000" style="background:#000000"></button>
        <button class="color-btn" data-color="#FF453A" style="background:#FF453A"></button>
        <button class="color-btn" data-color="#0A84FF" style="background:#0A84FF"></button>
        <button class="color-btn" data-color="#FFD60A" style="background:#FFD60A"></button>
      </div>
      <button id="btn-add-text" class="action-btn primary">Add</button>
    </div>
  </div>

  <!-- Toast notification -->
  <div id="toast" class="hidden"></div>

  <script src="app.js" type="module"></script>
</body>
</html>
